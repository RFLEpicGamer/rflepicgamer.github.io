<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Select a project</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="assets/favicon.ico" type="image/x-icon">
</head>
<body>
    <div class="container">
        <div>
            <a href="https://rflepicgamer.neocities.org" class="button">Back</a>
        </div>
        <div>
            <h1>Please select a project</h1>
        </div>
    </div>
    <div class="slideshow">
    <!--project slider start-->
    <div class="slider">
        <div class="slides">
            <!--buttons start-->
            <input type="radio" name="radio-btn" id="radio1">
            <input type="radio" name="radio-btn" id="radio2">
            <!--buttons end-->
            <!--slides start-->
            <div class="slide first">
                <a href="https://rfl8team.github.io">
                    <img src="assets/1.png" alt="RFL8Team">
                </a>
            </div>
            <div class="slide">
                <a href="/IsYTCI">
                    <img src="assets/2.png" alt="Is YouTube Completely Improved?">
                </a>
            </div>
            <!--slides end-->
            <!--automatic start-->
            <div class="navigation-auto">
                <div class="auto-btn1"></div>
                <div class="auto-btn2"></div>
            </div>
            <!--automatic end-->
        </div>
        <!--manual start-->
        <div class="navigation-manual">
            <label for="radio1" class="manual-btn"></label>
            <label for="radio2" class="manual-btn"></label>
        </div>
        <!--manual end-->
    </div>
    <!--project slider end-->

    <script type="text/javascript">
    var counter = 1;
    setInterval(function(){
        document.getElementById('radio' + counter).checked = true;
        counter++;
        if(counter > 2){
            counter = 1;
        }
    }, 5000);
    </script>
    </div>
    
</body>
</html>
